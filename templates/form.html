<!DOCTYPE html>
<html>
<head>
    <title>Submit Ticket</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 400px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 { text-align: center; }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            display: block;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50%;
            cursor: pointer;
        }
        .dashboard-btn {
    display: block;
    text-align: center;
    margin-top: 10px;
    padding: 12px;
    border-radius: 6px;
    background: #111827;
    color: white;
    text-decoration: none;
    font-size: 15px;
}

.dashboard-btn:hover {
    background: #000;
}
        .dashboard-btn {
    background: linear-gradient(45deg, #111827, #1f2937);
}

        /* ✅ FIXED CHATBOX */
        .chatbox {
            display: none;
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 320px;
            height: 420px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);

            flex-direction: column;
        }

        /* WHEN ACTIVE */
        .chatbox.active {
            display: flex;
        }

        .chat-header {
            background: #2563eb;
            color: white;
            padding: 12px;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            height: 40px;
            padding: 0 10px;
            border: 2px solid #2563eb;
            border-radius: 6px;
        }

        .chat-input button {
            width: 60px;
            background: #2563eb;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Submit Ticket</h2>
        <p class="subtitle">Raise your issue and we’ll resolve it quickly</p>

        <form method="POST" action="/submit">
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Email Address</label>
            <input type="email" name="email" required>

            <label>Issue Description</label>
            <textarea name="issue" rows="4"></textarea>

            <label>Priority</label>
            <select name="priority">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <button type="submit">Submit Ticket</button>
            <a href="/login" class="dashboard-btn">View Dashboard</a>
        </form>
    </div>
</div>

<!-- CHAT -->
<button onclick="toggleChat()" class="chat-btn">💬</button>

<div id="chatbox" class="chatbox">
    <div class="chat-header">AI Assistant</div>

    <div id="messages" class="chat-messages"></div>

    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Type message...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
function toggleChat() {
    document.getElementById("chatbox").classList.toggle("active");
}

function sendMessage() {
    let input = document.getElementById("userInput");
    let msg = input.value;

    if (!msg) return;

    let box = document.getElementById("messages");
    box.innerHTML += `<div><b>You:</b> ${msg}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
       box.innerHTML += `<div style="margin:5px 0;"><b>Bot:</b> ${data.reply}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
