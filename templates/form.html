</div>

<script>
function toggleChat() {
    let box = document.getElementById("chatbox");
    box.style.display = (box.style.display === "flex") ? "none" : "flex";
}

function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") return;

    let msgBox = document.getElementById("messages");
    msgBox.innerHTML += `<div><b>You:</b> ${message}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        msgBox.innerHTML += `<div><b>Bot:</b> ${data.reply}</div>`;

        if (data.autofill) {
            if (data.autofill.name)
                document.querySelector('input[name="name"]').value = data.autofill.name;

            if (data.autofill.email)
                document.querySelector('input[name="email"]').value = data.autofill.email;

            if (data.autofill.description)
                document.querySelector('textarea[name="issue"]').value = data.autofill.description;

            if (data.autofill.priority)
                document.querySelector('select[name="priority"]').value = data.autofill.priority;
        }

        msgBox.scrollTop = msgBox.scrollHeight;
    })
    .catch(() => {
        msgBox.innerHTML += `<div><b>Bot:</b> Server error</div>`;
    });

    input.value = "";
}

// ENTER KEY SEND
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

// SUCCESS POPUP
function showSuccessPopup() {
    const popup = document.getElementById("successPopup");
    popup.style.display = "flex";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);
}

// TRIGGER FROM URL
window.onload = function () {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("success") === "1") {
        showSuccessPopup();
    }
};
</script>

</body>
