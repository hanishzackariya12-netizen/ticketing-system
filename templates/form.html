<!DOCTYPE html>
<html>
<head>
    <title>Submit Ticket</title>

    <style>

/*  Background */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1d2b64, #f8cdda);
    height: 100vh;
    overflow-x: hidden;
}

/*  Center Layout */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

/*  Glass Card */
.form-container {
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    color: white;
}

/*  Title */
.form-container h2 {
    text-align: center;
    margin-bottom: 5px;
}

.form-container p {
    text-align: center;
    font-size: 14px;
    opacity: 0.8;
}

/*  Floating Input Group */
.input-group {
    position: relative;
    margin-top: 20px;
}

/*  Inputs */
.input-group input,
.input-group textarea,
.input-group select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
}

/*  Labels */
.input-group label {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 13px;
    color: #ddd;
    pointer-events: none;
    transition: 0.3s;
}

/*  Floating effect */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group textarea:focus + label,
.input-group textarea:not(:placeholder-shown) + label {
    top: -8px;
    left: 8px;
    font-size: 11px;
    color: #fff;
}

/*  Buttons */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/*  Dashboard Button */
.dashboard-btn {
    background: linear-gradient(45deg, #232526, #414345);
}

/*  CHATBOX PREMIUM */
.chatbox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Header */
.chat-header {
    padding: 15px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    font-weight: bold;
}

/* Messages */
.chat-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
    color: white;
}

/* Input Area */
.chat-input {
    display: flex;
    padding: 10px;
    gap: 8px;
}

/* Input */
.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Send Button */
.chat-input button {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<<div class="container">
<div class="form-container">

<h2>Submit Ticket</h2>
<p>Raise your issue and we’ll resolve it quickly</p>

<form method="POST">

<div class="input-group">
    <input type="text" name="name" required placeholder=" ">
    <label>Full Name</label>
</div>

<div class="input-group">
    <input type="email" name="email" required placeholder=" ">
    <label>Email Address</label>
</div>

<div class="input-group">
    <textarea name="issue" required placeholder=" "></textarea>
    <label>Issue Description</label>
</div>

<div class="input-group">
    <select name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>
</div>

<button class="btn">Submit Ticket</button>

<a href="/admin">
    <button type="button" class="btn dashboard-btn">View Dashboard</button>
</a>

</form>
</div>
</div>
<!-- CHAT -->
<button onclick="toggleChat()" class="chat-btn">💬</button>

<div id="chatbox" class="chatbox">
    <div class="chat-header">AI Assistant</div>

    <div id="messages" class="chat-messages"></div>

    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Type message...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
function toggleChat() {
    document.getElementById("chatbox").classList.toggle("active");
}

function sendMessage() {
    let input = document.getElementById("userInput");
    let msg = input.value;

    if (!msg) return;

    let box = document.getElementById("messages");
    box.innerHTML += `<div><b>You:</b> ${msg}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
    msgBox.innerHTML += `<div><b>🤖 Bot:</b> ${data.reply}</div>`;

    if (data.autofill) {
        document.querySelector("textarea[name='description']").value = data.autofill.description;
        document.querySelector("select[name='priority']").value = data.autofill.priority;
    }

    msgBox.scrollTop = msgBox.scrollHeight;
})
</script>

</body>
</html>
