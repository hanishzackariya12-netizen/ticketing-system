<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket System</title>

<style>
/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;

    background: linear-gradient(-45deg, #4facfe, #00f2fe, #667eea, #764ba2);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;

    display: flex;
    align-items: center;
    justify-content: center;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%;}
    50% { background-position: 100% 50%;}
    100% { background-position: 0% 50%;}
}

/* CARD */
.form-container {
    width: 360px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    color: white;

    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.2);
    color: white;

    transition: 0.3s;
}

input:focus, textarea:focus {
    background: rgba(255,255,255,0.35);
    transform: scale(1.02);
}

textarea {
    resize: none;
    height: 80px;
}

::placeholder {
    color: #ddd;
}

/* SELECT FIX */
select {
    background: white;
    color: black;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.submit-btn {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
}

.submit-btn:hover {
    transform: scale(1.05);
}

.dashboard-btn {
    background: #111;
    color: white;
}

/* CHAT BUTTON */
.chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;

    width: 60px;
    height: 60px;

    border-radius: 50%;
    border: none;

    background: linear-gradient(45deg, #0072ff, #00c6ff);
    color: white;
    font-size: 22px;
    cursor: pointer;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* CHATBOX */
.chatbox {
    position: fixed;
    bottom: 90px;
    right: 20px;

    width: 320px;
    height: 420px;

    border-radius: 20px;
    display: none;
    flex-direction: column;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    overflow: hidden;
}

.chat-header {
    padding: 12px;
    background: linear-gradient(45deg, #0072ff, #00c6ff);
    color: white;
}

.chat-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
}

.chat-input {
    display: flex;
    padding: 10px;
}

.chat-input input {
    flex: 1;
    padding: 8px;
}

.chat-input button {
    margin-left: 5px;
    background: #0072ff;
    color: white;
    border: none;
    border-radius: 5px;
}

/* SUCCESS POPUP */
.success-popup {
    position: fixed;
    top: 20px;
    background: #00c853;
    padding: 12px 20px;
    border-radius: 10px;
    color: white;
    display: none;

    animation: slideDown 0.5s ease;
}

@keyframes slideDown {
    from {transform: translateY(-50px); opacity:0;}
    to {transform: translateY(0); opacity:1;}
}
</style>

</head>

<body>

<div class="form-container">
    <h2>Submit Ticket</h2>

```
<form method="POST" action="/submit">
    <input id="name" name="name" placeholder="Full Name" required>
    <input id="email" name="email" type="email" placeholder="Email" required>
    <textarea id="issue" name="issue" placeholder="Describe your issue" required></textarea>

    <select id="priority" name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <button class="btn submit-btn">Submit Ticket</button>
</form>

<a href="/admin">
    <button class="btn dashboard-btn" type="button">View Dashboard</button>
</a>
```

</div>

<div id="successPopup" class="success-popup">✅ Ticket submitted successfully</div>

<button class="chat-btn" onclick="toggleChat()">💬</button>

<div id="chatbox" class="chatbox">
    <div class="chat-header">AI Assistant</div>

```
<div id="messages" class="chat-messages"></div>

<div class="chat-input">
    <input id="userInput" placeholder="Type message...">
    <button onclick="sendMessage()">➤</button>
</div>
```

</div>

<script>
function toggleChat() {
    let chat = document.getElementById("chatbox");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

async function sendMessage() {
    let input = document.getElementById("userInput");
    let msg = input.value;
    let box = document.getElementById("messages");

    if (!msg) return;

    box.innerHTML += "<b>You:</b> " + msg + "<br>";
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    typeMessage("Bot: " + data.reply);

    if (data.autofill) {
        if (data.autofill.name)
            document.getElementById("name").value = data.autofill.name;

        if (data.autofill.email)
            document.getElementById("email").value = data.autofill.email;

        document.getElementById("issue").value = data.autofill.description;
        document.getElementById("priority").value = data.autofill.priority;
    }

    box.scrollTop = box.scrollHeight;
}
function typeMessage(text) {
    let box = document.getElementById("messages");
    let div = document.createElement("div");

    box.appendChild(div);

    let i = 0;
    function typing() {
        if (i < text.length) {
            div.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }

    typing();
    box.scrollTop = box.scrollHeight;
}

// SUCCESS POPUP
window.onload = () => {
    const url = new URL(window.location.href);
    if (url.searchParams.get("success")) {
        let popup = document.getElementById("successPopup");
        popup.style.display = "block";

        setTimeout(() => popup.style.display = "none", 3000);
    }
};
document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
});
</script>

</body>
</html>
